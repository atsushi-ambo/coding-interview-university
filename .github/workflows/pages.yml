name: Deploy CS Quest to GitHub Pages

# main へ push されるたびに docsify サイトを GitHub Pages へ公開する。
# configure-pages の enablement:true が、設定画面を触らずに Pages を自動で有効化する。

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN に Pages 公開と OIDC の権限を与える
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は 1 つに絞る(進行中のデプロイは止めない)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble site (exclude .git)
        run: |
          mkdir -p _site
          # docsify は全 Markdown を必要とするのでリポジトリをまるごと公開する。
          # ただし .git と _site 自身は除外する。
          rsync -a --exclude='.git' --exclude='_site' ./ _site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
